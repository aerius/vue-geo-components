name: Release publish

# Publish to Nexus when a GitHub Release is published. The version comes from
# package.json at the tagged commit; the guard fails the run if it doesn't match
# the tag. Upstream repo only.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'aerius/vue-geo-components'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: ${{ vars.NEXUS_REGISTRY || 'https://nexus.aerius.nl/repository/npm/' }}
          scope: "@aerius"

      - name: Check package.json matches the release tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json is $PKG but the release tag is $TAG."
            echo "Run 'npm version $TAG' on the release commit and re-tag."
            exit 1
          fi

      - run: npm ci
      - run: npm run build-only
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NEXUS_TOKEN }}
