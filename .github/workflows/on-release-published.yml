name: release-published-event

# Publishes @aerius/vue-geo-components to Aerius Nexus when a GitHub Release is
# published. Cut the release after `npm run version` has bumped the version and
# updated CHANGELOG.md on main (see docs/versioning.md).
#
# Nexus auth follows the org convention (see aerius/search, aerius/IMAER-java):
# the NEXUS_USERNAME / NEXUS_PASSWORD secrets. The committed .npmrc reads them as
# a base64 basic-auth token via the NEXUS_AUTH env var.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build, type-check and test
        run: npm run build && npm test

      - name: Publish to Nexus
        run: |
          export NEXUS_AUTH="$(printf '%s:%s' "$NEXUS_USERNAME" "$NEXUS_PASSWORD" | base64 -w0)"
          npm publish
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
