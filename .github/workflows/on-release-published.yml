name: release-published-event

# Publishes @aerius/vue-geo-components to Aerius Nexus when a GitHub Release is
# published. The git tag is the source of truth for the version: the tag
# `v0.2.0` publishes `0.2.0` under the `latest` tag. package.json stays at its
# placeholder `0.0.0` in the repo; the version is injected here at publish time.
#
# Auth uses the NEXUS_TOKEN secret (a token for a dedicated Nexus CI account),
# which the committed .npmrc reads. Only runs on the upstream repo, so forks
# never publish.
on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'aerius/vue-geo-components'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build, type-check and test
        run: npm run build && npm test

      - name: Set version from the release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - name: Publish to Nexus
        run: npm publish
        env:
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}
