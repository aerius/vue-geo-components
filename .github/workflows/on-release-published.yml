name: release-published-event

# Publishes @aerius/vue-geo-components to Aerius Nexus when a GitHub Release is
# published. The git tag is the source of truth: tag `v0.2.0` publishes `0.2.0`
# under the `latest` tag. After publishing, the version is written back into
# package.json on main, so the repo always reflects the current release.
#
# Auth: NEXUS_TOKEN secret for publishing (read by .npmrc). The bump-back pushes
# to main with the built-in GITHUB_TOKEN, so branch protection must allow
# github-actions to push to main. Only runs on the upstream repo.
on:
  release:
    types: [published]

jobs:
  publish:
    if: github.repository == 'aerius/vue-geo-components'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Checks out the released (tagged) commit, so we publish exactly that code.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build, type-check and test
        run: npm run build && npm test

      - name: Set version from the release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - name: Publish to Nexus
        run: npm publish
        env:
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}

  # Write the released version back into package.json on main. Runs only after a
  # successful publish. Pushes with GITHUB_TOKEN, which does not re-trigger any
  # workflow (and [skip ci] guards the case where a PAT is used instead).
  bump-version:
    needs: publish
    if: github.repository == 'aerius/vue-geo-components'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Write the release version into package.json on main
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if git diff --quiet; then
            echo "package.json already at $VERSION, nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: set version $VERSION [skip ci]"
            git push origin main
          fi
