name: CI and snapshot publish

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm test
      - run: npm run build-only

  # Every push to main publishes a snapshot to the `dev` tag on Nexus, so apps
  # can track the newest build. package.json stays pinned at 0.0.0-development
  # and is never edited; the workflow gives each snapshot a unique version by
  # appending the commit hash. Nothing is committed back to the repo.
  #
  # Only runs on the upstream repo, so pushes to a fork run CI but never publish.
  # Serialized so two quick pushes can't leave `dev` on the older commit.
  publish-snapshot:
    needs: build
    if: github.repository == 'aerius/vue-geo-components' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-snapshot
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: ${{ vars.NEXUS_REGISTRY || 'https://nexus.aerius.nl/repository/npm/' }}
          scope: "@aerius"

      - run: npm ci

      - name: Version this snapshot with the commit hash
        run: npm version "0.0.0-development-${GITHUB_SHA::7}" --no-git-tag-version --allow-same-version

      - run: npm run build-only

      - name: Publish snapshot to the dev tag
        run: npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NEXUS_TOKEN }}
