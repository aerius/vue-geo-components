name: push-event

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build library
        run: npm run build-only

  # After CI passes on main, publish a snapshot to the `dev` tag on Nexus.
  # Each snapshot gets a unique version (<base>-dev-<git hash>), so apps that
  # depend on the "dev" tag just refetch to get the newest build. Real releases
  # go out separately via on-release-published.yml (the `latest` tag).
  #
  # Gated to the upstream repo, so pushes to a fork run CI but never publish.
  publish-snapshot:
    needs: build
    if: github.repository == 'aerius/vue-geo-components' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need tags so we can base the snapshot on the latest release.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Set snapshot version
        run: |
          # Base the snapshot on the latest release tag (v0.1.0 -> 0.1.0), so
          # snapshots read as 0.1.0-dev-<hash>. Falls back to 0.0.0 before the
          # first release. The "dev-" prefix keeps the git hash from ever being
          # read as a number, so this is always valid semver.
          BASE=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          BASE=${BASE:-0.0.0}
          npm version "${BASE}-dev-${GITHUB_SHA::7}" --no-git-tag-version

      - name: Build
        run: npm run build-only

      - name: Publish snapshot to Nexus (dev tag)
        run: npm publish --tag dev
        env:
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}
